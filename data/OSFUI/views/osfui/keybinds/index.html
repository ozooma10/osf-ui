<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keybinds</title>
  <link rel="stylesheet" href="../../shared/osfui.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Dims the live game behind the panel into a menu backdrop. -->
  <div class="scrim" aria-hidden="true"></div>

  <div class="keybinds">
    <header class="kb-head">
      <div class="brand">
        <svg class="brand-emblem" width="34" height="34" viewBox="0 0 200 200" aria-hidden="true">
          <circle cx="100" cy="100" r="92" fill="#11151b" stroke="#5c646e" stroke-width="3"></circle>
          <circle cx="100" cy="100" r="82" fill="none" stroke="#2f353d" stroke-width="1.2"></circle>
          <g fill="none" stroke="#9fc7dc" stroke-linecap="round" stroke-width="8">
            <line x1="62" y1="74" x2="138" y2="74"></line>
            <line x1="62" y1="100" x2="138" y2="100"></line>
            <line x1="62" y1="126" x2="138" y2="126"></line>
          </g>
          <circle cx="84" cy="74" r="9" fill="#0b0e12" stroke="#9fc7dc" stroke-width="6"></circle>
          <circle cx="120" cy="100" r="9" fill="#0b0e12" stroke="#9fc7dc" stroke-width="6"></circle>
          <circle cx="92" cy="126" r="9" fill="#0b0e12" stroke="#9fc7dc" stroke-width="6"></circle>
        </svg>
        <div class="brand-text">
          <div class="brand-line">
            <span class="wordmark-osf">OSF</span><span class="wordmark-ui">UI</span>
          </div>
          <div class="osf-eyebrow brand-sub" data-i18n="chrome.keybinds.inputMap">INPUT MAP</div>
        </div>
      </div>
      <label class="osf-search" for="search">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4 4"></path></svg>
        <input id="search" class="osf-input kb-search" type="text"
          placeholder="Find a key, action, or mod" aria-label="Find a key, action, or mod" data-i18n-placeholder="chrome.keybinds.searchPlaceholder" data-i18n-aria-label="chrome.keybinds.searchPlaceholder" aria-keyshortcuts="Control+F" autocomplete="off" spellcheck="false">
        <kbd>Ctrl F</kbd>
      </label>
      <button id="back" type="button" class="osf-btn osf-btn--ghost osf-btn--sm osf-close" aria-keyshortcuts="Escape"><span data-i18n="chrome.keybinds.backToMods">Back to Mods</span><kbd>Esc</kbd></button>
    </header>

    <section class="kb-board-shell" aria-labelledby="keyboard-title">
      <div class="kb-board-head">
        <div>
          <div class="osf-eyebrow" id="keyboard-title" data-i18n="chrome.keybinds.keyboardMap">Keyboard map</div>
          <p data-i18n="chrome.keybinds.instructions">Select a key to inspect every action assigned to it.</p>
        </div>
        <div class="kb-legend osf-eyebrow" aria-hidden="true">
          <span class="legend-item"><i class="legend-swatch legend-mod"></i><span data-i18n="chrome.keybinds.mod">Mod</span></span>
          <span class="legend-item"><i class="legend-swatch legend-game"></i><span data-i18n="chrome.keybinds.game">Game</span></span>
          <span class="legend-item"><i class="legend-swatch legend-shared"></i><span data-i18n="chrome.keybinds.shared">Shared</span></span>
          <span class="legend-item"><i class="legend-swatch legend-conflict"></i><span data-i18n="chrome.keybinds.conflict">Conflict</span></span>
        </div>
      </div>
      <div id="keyboard" class="kb-board" aria-label="Keyboard map"></div>
    </section>

    <div class="kb-lower">
      <section class="kb-panel kb-detail-panel" aria-live="polite">
        <div class="osf-eyebrow kb-panel-title" id="detail-title" data-i18n="chrome.keybinds.selectKey">Select a key</div>
        <div id="detail" class="kb-detail"></div>
      </section>
      <section class="kb-panel kb-list-panel">
        <div class="osf-eyebrow kb-panel-title" id="list-title" data-i18n="chrome.keybinds.allBindings">All bindings</div>
        <div id="bindlist" class="kb-list"></div>
      </section>
    </div>

    <p id="status" class="kb-status osf-eyebrow" data-i18n="chrome.common.loading">Loading…</p>
  </div>

  <div id="toast" class="toast-stack" aria-live="polite"></div>

  <script src="../../shared/osfui.js"></script>
  <script src="../padnav.js"></script>
  <script src="main.js"></script>
</body>
</html>

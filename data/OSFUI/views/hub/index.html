<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OSF UI</title>
  <link rel="stylesheet" href="../shared/osfui.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="osf-ui">
  <!-- Scrim: dims + grids the live game behind the overlay so the launcher
       reads as a modal menu. Background stays transparent (the real game is
       composited underneath) — unlike the design mockup, there is no faux
       game layer here. -->
  <div class="scrim" aria-hidden="true">
    <div class="scrim-dim"></div>
    <div class="scrim-grid"></div>
    <div class="scrim-halo"></div>
    <div class="scrim-vignette"></div>
  </div>

  <div class="hub">
    <header class="hub-header">
      <div class="brand">
        <svg class="brand-emblem" width="46" height="46" viewBox="0 0 200 200" aria-hidden="true">
          <circle cx="100" cy="100" r="92" fill="#11151b" stroke="#5c646e" stroke-width="3"></circle>
          <circle cx="100" cy="100" r="82" fill="none" stroke="#2f353d" stroke-width="1.2"></circle>
          <g fill="none" stroke="#5aa9b8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="60" y="66" width="80" height="40" rx="3.5" stroke-width="2.4"></rect>
            <path d="M62 66 h76 a2 2 0 0 1 2 2 v5 h-80 v-5 a2 2 0 0 1 2 -2 z" fill="#5aa9b8" stroke="none"></path>
            <line x1="94" y1="86" x2="132" y2="86" stroke="#9aa3ad" stroke-width="2"></line>
            <line x1="94" y1="95" x2="124" y2="95" stroke="#9aa3ad" stroke-width="2"></line>
          </g>
          <polyline points="92,126 100,118 108,126" fill="none" stroke="#5aa9b8" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <line x1="100" y1="108" x2="100" y2="120" stroke="#9aa3ad" stroke-width="1.6"></line>
          <circle cx="100" cy="132" r="4.2" fill="#5aa9b8"></circle>
        </svg>
        <div class="brand-text">
          <div class="brand-line">
            <span class="wordmark-osf">OSF</span>
            <span class="wordmark-ui">UI</span>
            <span class="brand-sep"></span>
            <span class="eyebrow brand-tag">VIEW LAUNCHER</span>
          </div>
          <div class="eyebrow brand-sub">NATIVE UI OVERLAY FRAMEWORK</div>
        </div>
      </div>
      <div class="status">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-label" id="status-label">CONNECTING</span>
        <span class="status-counts" id="status-counts">· — VIEWS · — LIVE</span>
      </div>
    </header>

    <div class="accent-bar" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>

    <main class="hub-body" id="hub-body">
      <section class="views-section" id="menus-section">
        <div class="section-head">
          <span class="section-title">Menus</span>
          <span class="section-count" id="menus-count">00</span>
          <span class="section-rule"></span>
          <span class="section-note">SELECT TO OPEN · HUB CLOSES</span>
        </div>
        <div class="menu-grid" id="menu-grid"></div>
      </section>

      <section class="views-section" id="huds-section">
        <div class="section-head">
          <span class="section-title">Huds</span>
          <span class="section-count" id="huds-count">00</span>
          <span class="section-rule"></span>
          <span class="section-note">TOGGLE OVER GAMEPLAY · <span id="huds-active">00</span> ACTIVE</span>
        </div>
        <div class="hud-list" id="hud-list"></div>
      </section>

      <p class="empty-note" id="empty-note" hidden>No views installed.</p>
    </main>

    <footer class="hub-footer">
      <span class="footer-brand"><span class="footer-brand-name">OSF UI FRAMEWORK</span> · <span id="footer-version">v0.1.0</span></span>
      <div class="hints" id="hints"></div>
    </footer>
  </div>

  <!-- Shown briefly when a menu is launched (the hub is replaced on the
       single-menu stack, so this is a transient hand-off flourish). -->
  <div class="launch-overlay" id="launch-overlay" hidden>
    <svg class="launch-emblem" width="60" height="60" viewBox="0 0 200 200" aria-hidden="true">
      <circle cx="100" cy="100" r="90" fill="none" stroke="#5c646e" stroke-width="5"></circle>
      <rect x="56" y="66" width="88" height="44" rx="5" fill="none" stroke="#5aa9b8" stroke-width="6"></rect>
      <polyline points="84,130 100,114 116,130" fill="none" stroke="#5aa9b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></polyline>
    </svg>
    <div class="launch-text">
      <div class="eyebrow launch-eyebrow">OPENING VIEW</div>
      <div class="launch-title" id="launch-title"></div>
    </div>
    <div class="launch-bar"><span></span></div>
    <div class="launch-note">Hub closing · single-menu model</div>
  </div>

  <script src="main.js"></script>
</body>
</html>

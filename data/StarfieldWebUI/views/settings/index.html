<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Starfield Web UI Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="panel">
    <h1 id="title">Settings</h1>
    <p id="status" class="status">Loading…</p>

    <form id="form" class="form" autocomplete="off"></form>

    <div class="actions">
      <button id="close" type="button" class="danger">Close</button>
    </div>

    <!-- Plain text on purpose: no links, so an in-overlay click can't
         navigate the view away. Clickable credits live in README/CREDITS.md. -->
    <footer class="credits">
      Inspired by Prisma UI (StarkMP) &middot; Rendering by Ultralight
    </footer>
  </main>
  <!-- Software pointer driven by the routed virtual cursor. -->
  <div id="cursor" class="cursor" aria-hidden="true"></div>
  <script src="main.js"></script>
</body>
</html>

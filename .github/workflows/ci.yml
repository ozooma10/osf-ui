# CI runs the host-side native/frontend suites and builds the production WebView2 target.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Native unit tests (host-side)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # No submodules: the suites compile the runtime/api/input sources against tests/native/stubs (a std umbrella + a REX log stub), not CommonLibSF.
      - uses: actions/checkout@v4

      - name: Run native suites
        # Compiles the real store/module/bridge/api/hotkey sources on clang and runs them; 
        # exit code = number of failing checks (see tests/native/run.sh).
        run: bash tests/native/run.sh
        env:
          CXX: clang++

      - name: Check protocol version lockstep
        # kBridgeProtocolVersion (src/core/Version.h) is claimed as a literal in the SDK README's headline, 
        # the authoring guide's status blurb + versioning section, and the .d.ts header
        # the "docs say 0.1, code says 0.4" drift class must not recur. Each headline site must name the CURRENT version. ("protocol 0.4"-style historical annotations elsewhere are fine and not checked.)
        run: |
          set -e
          V=$(sed -n 's/.*kBridgeProtocolVersion = "\([0-9.]*\)".*/\1/p' src/core/Version.h)
          test -n "$V" || { echo "::error::could not extract kBridgeProtocolVersion"; exit 1; }
          echo "kBridgeProtocolVersion = $V"
          fail=0
          check() { grep -qE "$2" "$1" || { echo "::error file=$1::headline does not claim bridge protocol $V ($2)"; fail=1; }; }
          check sdk/README.md            "^\*\*$V — stable\.\*\*"
          check docs/authoring-views.md  "protocol is at version \*\*$V — stable\*\*"
          check docs/authoring-views.md  "protocol version is \*\*$V\*\*"
          check sdk/osfui.d.ts           "Bridge protocol version: $V"
          exit $fail

  frontend:
    name: Frontend (typecheck, build, stale-check, tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinned major, not 'latest': the staleness check below byte-compares
          # generated output, so the toolchain must not drift under us.
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (locked)
        run: npm ci
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Build generated views
        run: npm run build
        working-directory: frontend

      # data/OSFUI/views is generated AND committed - packaging, the MO2 redeploy
      # and xmake install all read it directly, and none of them can run Node.
      # Rebuilding here and asserting nothing changed is what keeps the committed
      # output honest. Runs before the test suite because the build-output gates
      # in test/build.*.test.ts read that tree.
      - name: Generated view output is up to date
        run: npm run check:dist
        working-directory: frontend

      - name: Tests
        run: npm test
        working-directory: frontend

      - name: Audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

  build:
    name: Build WebView2 (${{ matrix.mode }})
    runs-on: windows-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        mode: [debug, releasedbg]

    steps:
      - uses: actions/checkout@v4
        with:
          # lib/commonlibsf, which nests lib/commonlib-shared
          submodules: recursive

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/.xmake
          key: xmake-pkg-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: xmake-pkg-${{ runner.os }}-

      - name: Validate shipped JSON
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *.json -Path data, docs/schema | ForEach-Object {
            try {
              Get-Content $_.FullName -Raw | ConvertFrom-Json | Out-Null
            } catch {
              Write-Host "::error file=$($_.FullName)::invalid JSON: $($_.Exception.Message)"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host "all shipped JSON parses"

      - name: Fetch WebView2 SDK
        shell: pwsh
        run: |
          $version = "1.0.4078.44"
          $archive = Join-Path $env:RUNNER_TEMP "webview2.zip"
          $uri = "https://api.nuget.org/v3-flatcontainer/microsoft.web.webview2/$version/microsoft.web.webview2.$version.nupkg"
          Invoke-WebRequest -Uri $uri -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath external/webview2 -Force

      - name: Configure
        run: xmake f -y -m ${{ matrix.mode }} --with_webview2=true

      - name: Build
        run: xmake build -y

      - name: Stage install layout
        run: xmake install -y -o out/staging "OSF UI"

      - name: Verify staged layout
        shell: pwsh
        run: |
          $root = "out/staging"
          $must = @(
            "$root/SFSE/Plugins/OSFUI.dll",
            "$root/SFSE/Plugins/OSFUI.pdb",
            "$root/SFSE/Plugins/OSFUI/config.json",
            "$root/SFSE/Plugins/OSFUI/bin/osfui_webview2_host.exe"
          )
          $failed = $false
          foreach ($f in $must) {
            if (-not (Test-Path $f)) {
              Write-Host "::error::missing from install layout: $f"
              $failed = $true
            }
          }
          # Regression gate: Ultralight was removed as a backend. Nothing
          # named after it may reappear in a shipped layout, and the plugin
          # must not import its DLLs.
          $stray = Get-ChildItem -Path $root -Recurse -Force -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '(?i)ultralight|webcore|appcore' }
          foreach ($s in $stray) {
            Write-Host "::error::Ultralight footprint in install layout: $($s.FullName)"
            $failed = $true
          }
          # Read via PowerShell cmdlets, not [System.IO.File]: the latter uses
          # the process working directory, which Set-Location does not update,
          # so a relative path there can throw and silently skip the scan.
          $dll = "$root/SFSE/Plugins/OSFUI.dll"
          if (Test-Path $dll) {
            $bytes = Get-Content -LiteralPath $dll -AsByteStream -ReadCount 0
            if (-not $bytes -or $bytes.Length -eq 0) {
              Write-Host "::error::could not read $dll for the Ultralight import scan"
              $failed = $true
            } else {
              $ascii = [System.Text.Encoding]::ASCII.GetString($bytes)
              foreach ($needle in @('Ultralight.dll', 'UltralightCore.dll', 'WebCore.dll', 'AppCore.dll')) {
                if ($ascii -match [regex]::Escape($needle)) {
                  Write-Host "::error::OSFUI.dll still references $needle"
                  $failed = $true
                }
              }
              Write-Host "import scan clean ($($bytes.Length) bytes)"
            }
          }

          # The runtime needs at least one view to host.
          $manifests = Get-ChildItem -Path "$root/SFSE/Plugins/OSFUI/views" -Recurse -Filter manifest.json -ErrorAction SilentlyContinue
          if (-not $manifests) {
            Write-Host "::error::no views/*/manifest.json in the install layout"
            $failed = $true
          }
          if ($failed) { exit 1 }
          Write-Host "install layout OK ($(($manifests | Measure-Object).Count) view manifest(s))"

      - uses: actions/upload-artifact@v4
        with:
          name: OSFUI-webview2-${{ matrix.mode }}
          path: out/staging/
          if-no-files-found: error

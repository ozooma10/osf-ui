<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Renderer Stress</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Scene stages. Exactly one carries .on at a time; the rest are display:none
       so a scene costs nothing while it is not the subject. -->
  <div class="stage" id="stage-idle">
    <div class="idle-card">
      <h1>Idle</h1>
      <p>Static content. This is the floor: whatever the pipeline costs with a
         loaded page that never changes a pixel.</p>
    </div>
  </div>

  <div class="stage" id="stage-css-transform">
    <div class="orbit-field" id="orbit-field"></div>
  </div>

  <div class="stage" id="stage-paint">
    <div class="paint-grid" id="paint-grid"></div>
  </div>

  <div class="stage" id="stage-canvas">
    <canvas id="particles"></canvas>
  </div>

  <div class="stage" id="stage-layout">
    <div class="layout-list" id="layout-list"></div>
  </div>

  <div class="stage" id="stage-fullscreen">
    <div class="fs-gradient" id="fs-gradient"></div>
    <div class="fs-sweep" id="fs-sweep"></div>
  </div>

  <!-- Always-on instrument panel. Deliberately cheap: text nodes only, updated
       at 4 Hz, so the HUD itself is never a meaningful part of the measurement. -->
  <div class="hud">
    <div class="hud-scene">
      <span class="hud-index" id="hud-index">1/6</span>
      <span class="hud-name" id="hud-name">idle</span>
      <span class="hud-state" id="hud-state"></span>
    </div>
    <div class="hud-bar"><div class="hud-bar-fill" id="hud-bar"></div></div>
    <p class="hud-desc" id="hud-desc"></p>
    <dl class="hud-stats">
      <div><dt>fps now</dt><dd id="stat-fps">—</dd></div>
      <div><dt>fps avg</dt><dd id="stat-avg">—</dd></div>
      <div><dt>worst frame</dt><dd id="stat-worst">—</dd></div>
      <div><dt>long frames</dt><dd id="stat-long">—</dd></div>
    </dl>
    <p class="hud-keys">
      <kbd>1</kbd>–<kbd>6</kbd> hold scene · <kbd>0</kbd> auto-cycle ·
      <kbd>P</kbd> pause · <kbd>R</kbd> reset stats
    </p>
  </div>

  <!-- The bridge helper is REQUIRED, not optional: a view declaring
       nativeBridge must install osfui.onMessage, or the runtime holds its
       queued messages and never puts it on screen (queue-until-first-paint).
       Only the shared JS is linked — shared/osfui.css is deliberately not,
       so this view's pixels stay fixed across kit revisions. -->
  <script src="../../shared/osfui.js"></script>
  <script src="main.js"></script>
</body>
</html>

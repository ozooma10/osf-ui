<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg" role="img">
<title>OSF UI web-overlay emblem</title>
<desc>The OSF UI mark alone, transparent: a floating web-UI overlay panel with a title bar and three window dots, content lines and a settings toggle, layered over a second view behind it, with a teal click-ripple and a bright hardware-pointer cursor clicking a control.</desc>
<defs>
  <clipPath id="ePanel"><rect x="150" y="176" width="212" height="150" rx="13"/></clipPath>
</defs>

<!-- second layered view behind (multi-view compositing) -->
<rect x="122" y="152" width="190" height="132" rx="11" fill="#0e1720" stroke="#2b8ea6" stroke-opacity="0.34" stroke-width="1.8"/>
<line x1="122" y1="182" x2="312" y2="182" stroke="#2b8ea6" stroke-opacity="0.22" stroke-width="1.4"/>

<!-- front view panel -->
<rect x="150" y="176" width="212" height="150" rx="13" fill="#0d151e" stroke="#3aa9c0" stroke-width="2.2"/>
<g clip-path="url(#ePanel)"><rect x="150" y="176" width="212" height="30" fill="#12222c"/></g>
<line x1="150" y1="206" x2="362" y2="206" stroke="#3aa9c0" stroke-width="1.6" stroke-opacity="0.7"/>
<g fill="#3aa9c0">
  <circle cx="168" cy="191" r="3.6"/><circle cx="182" cy="191" r="3.6" fill="#6fd0da"/><circle cx="196" cy="191" r="3.6" fill="#dff6f8"/>
</g>

<!-- content lines -->
<rect x="168" y="226" width="132" height="9" rx="4.5" fill="#7f8a95"/>
<rect x="168" y="247" width="168" height="9" rx="4.5" fill="#2f8fa6"/>
<rect x="168" y="268" width="102" height="9" rx="4.5" fill="#55636e"/>

<!-- settings toggle -->
<rect x="300" y="262" width="44" height="20" rx="10" fill="#123039" stroke="#3aa9c0" stroke-width="1.7"/>
<circle cx="334" cy="272" r="7" fill="#6fd0da"/>

<!-- click ripple at the cursor tip -->
<g fill="none" stroke="#3aa9c0">
  <circle cx="334" cy="272" r="22" stroke-opacity="0.42" stroke-width="2"/>
  <circle cx="334" cy="272" r="36" stroke-opacity="0.24" stroke-width="1.6"/>
  <circle cx="334" cy="272" r="50" stroke-opacity="0.12" stroke-width="1.3"/>
</g>

<!-- hardware pointer cursor -->
<g transform="translate(326,264) scale(1.5)">
  <path d="M0 0 L0 24 L6.6 17.6 L11.2 27.4 L15.4 25.4 L10.8 15.8 L20 15.6 Z" fill="#eef4f6" stroke="#1c5a68" stroke-width="1.4" stroke-linejoin="round"/>
</g>
</svg>

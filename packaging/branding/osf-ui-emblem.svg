<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg" role="img">
<title>OSF UI nested-frame signal emblem</title>
<desc>The OSF UI mark alone, transparent: two concentric teal view frames — an outer screen framing an inner OSF view — with a flat signal line running through the centre, diamond endpoint nodes, and a ringed playhead-style focus node at dead centre. The screen-space sibling of OSF Animation's amber playback-curve emblem.</desc>

<!-- outer view (the game's screen) -->
<rect x="120" y="162" width="272" height="188" fill="none" stroke="#3aa9c0" stroke-opacity="0.3" stroke-width="4"/>

<!-- inner view (the OSF UI overlay) -->
<rect x="156" y="191" width="200" height="130" fill="#0a0d12" fill-opacity="0.88" stroke="#3aa9c0" stroke-width="6"/>

<!-- focus rings (family motif: rings around the thing that matters) -->
<g fill="none" stroke="#3aa9c0">
  <circle cx="256" cy="256" r="26" stroke-opacity="0.5" stroke-width="2.8"/>
  <circle cx="256" cy="256" r="44" stroke-opacity="0.28" stroke-width="2.3"/>
  <circle cx="256" cy="256" r="62" stroke-opacity="0.14" stroke-width="2"/>
</g>

<!-- signal line with diamond endpoints -->
<line x1="182" y1="256" x2="330" y2="256" stroke="#3aa9c0" stroke-width="5" stroke-linecap="round"/>
<path d="M182 248 L190 256 L182 264 L174 256 Z" fill="#6fd0da"/>
<path d="M330 248 L338 256 L330 264 L322 256 Z" fill="#6fd0da"/>

<!-- ringed focus node, dead centre -->
<circle cx="256" cy="256" r="12" fill="none" stroke="#3aa9c0" stroke-width="5"/>
<circle cx="256" cy="256" r="5" fill="#dff6f8"/>
</svg>

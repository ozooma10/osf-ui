<svg xmlns="http://www.w3.org/2000/svg" viewBox="32 32 616 616" width="1024" height="1024" role="img" font-family="Bahnschrift, 'DIN Next', 'Oswald', 'Segoe UI Semibold', sans-serif">
<title>OSF UI mission patch — emblem variant (no wordmark)</title>
<desc>The OSF UI mission patch without the central wordmark: teal merrowed border with EST MMXXVI curved across the top and USER INTERFACE FRAMEWORK across the bottom, flanked by cyan stars. Centered in the ring, the nested-frame signal emblem — two concentric teal view frames with a flat signal line, diamond endpoint nodes and a ringed focus node — over a dark Starfield planet limb, on near-black with a faint starfield.</desc>
<defs>
  <clipPath id="scene"><circle cx="340" cy="340" r="238"/></clipPath>
  <path id="topArc" d="M116.61 221.22 A253 253 0 0 1 563.39 221.22" fill="none"/>
  <path id="botArc" d="M111.03 483.08 A270 270 0 0 0 568.97 483.08" fill="none"/>
</defs>

<circle cx="340" cy="340" r="296" fill="#2f9fb4"/>
<circle cx="340" cy="340" r="289" fill="none" stroke="#17565f" stroke-width="3"/>
<circle cx="340" cy="340" r="283" fill="#0c1118"/>
<circle cx="340" cy="340" r="238" fill="#0a0d12"/>

<g clip-path="url(#scene)">
  <g fill="#dcefe9">
    <circle cx="168" cy="196" r="1.2" opacity="0.45"/><circle cx="200" cy="158" r="0.9" opacity="0.38"/>
    <circle cx="512" cy="168" r="1.1" opacity="0.45"/><circle cx="486" cy="206" r="0.9" opacity="0.4"/>
    <circle cx="150" cy="262" r="1" opacity="0.4"/><circle cx="540" cy="262" r="1.1" opacity="0.44"/>
    <circle cx="498" cy="402" r="0.9" opacity="0.36"/><circle cx="178" cy="372" r="0.9" opacity="0.36"/>
    <circle cx="158" cy="216" r="0.8" opacity="0.32"/><circle cx="524" cy="232" r="0.8" opacity="0.34"/>
  </g>
  <circle cx="340" cy="845" r="360" fill="#141d29"/>
  <circle cx="340" cy="845" r="360" fill="none" stroke="#2b8ea6" stroke-width="2.5" opacity="0.6"/>
  <circle cx="340" cy="845" r="347" fill="none" stroke="#7fd8e0" stroke-width="1" opacity="0.28"/>
</g>

<circle cx="340" cy="340" r="239" fill="none" stroke="#b9c0c9" stroke-opacity="0.2" stroke-width="1"/>
<g stroke="#b9c0c9" stroke-opacity="0.38" stroke-width="1.6" stroke-linecap="round">
  <line x1="340" y1="98" x2="340" y2="104" transform="rotate(45 340 340)"/>
  <line x1="340" y1="98" x2="340" y2="104" transform="rotate(135 340 340)"/>
  <line x1="340" y1="98" x2="340" y2="104" transform="rotate(225 340 340)"/>
  <line x1="340" y1="98" x2="340" y2="104" transform="rotate(315 340 340)"/>
</g>

<text font-size="15" letter-spacing="7" font-weight="600" text-anchor="middle" fill="#9aa3ad">
  <textPath href="#topArc" startOffset="50%">EST · MMXXVI</textPath>
</text>
<text font-size="15.5" letter-spacing="4" font-weight="500" text-anchor="middle" fill="#aeb6bf">
  <textPath href="#botArc" startOffset="50%">USER INTERFACE FRAMEWORK</textPath>
</text>

<!-- nested-frame signal emblem, centred in the ring -->
<g transform="translate(45.6,45.6) scale(1.15)">
  <rect x="120" y="162" width="272" height="188" fill="none" stroke="#3aa9c0" stroke-opacity="0.3" stroke-width="4"/>
  <rect x="156" y="191" width="200" height="130" fill="#0a0d12" fill-opacity="0.88" stroke="#3aa9c0" stroke-width="6"/>
  <g fill="none" stroke="#3aa9c0">
    <circle cx="256" cy="256" r="26" stroke-opacity="0.5" stroke-width="2.8"/>
    <circle cx="256" cy="256" r="44" stroke-opacity="0.28" stroke-width="2.3"/>
    <circle cx="256" cy="256" r="62" stroke-opacity="0.14" stroke-width="2"/>
  </g>
  <line x1="182" y1="256" x2="330" y2="256" stroke="#3aa9c0" stroke-width="5" stroke-linecap="round"/>
  <path d="M182 248 L190 256 L182 264 L174 256 Z" fill="#6fd0da"/>
  <path d="M330 248 L338 256 L330 264 L322 256 Z" fill="#6fd0da"/>
  <circle cx="256" cy="256" r="12" fill="none" stroke="#3aa9c0" stroke-width="5"/>
  <circle cx="256" cy="256" r="5" fill="#dff6f8"/>
</g>

<!-- flanking stars -->
<g fill="#6fd0da">
  <path d="M78 328 L81.1 336.9 L90 340 L81.1 343.1 L78 352 L74.9 343.1 L66 340 L74.9 336.9 Z"/>
  <path d="M602 328 L605.1 336.9 L614 340 L605.1 343.1 L602 352 L598.9 343.1 L590 340 L598.9 336.9 Z"/>
</g>
</svg>

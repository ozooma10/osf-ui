<svg width="1600" height="520" viewBox="0 0 1600 520" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Bahnschrift, 'DIN Next', 'Oswald', 'Segoe UI Semibold', sans-serif">
<title>OSF UI header banner</title>
<desc>A wide NASA-punk header: the OSF UI mission patch at left in its emblem variant — teal ring with EST MMXXVI and USER INTERFACE FRAMEWORK arc text, flanking stars, and the nested-frame signal emblem centered over a dark planet limb — with the wordmark OSF in brushed steel and UI in teal over the tagline Web Interface Framework, on a near-black starfield.</desc>
<defs>
  <linearGradient id="hosf" x1="0" y1="190" x2="0" y2="290" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#d4dae1"/><stop offset="1" stop-color="#828a93"/>
  </linearGradient>
  <linearGradient id="hui" x1="1090" y1="200" x2="1290" y2="290" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#7bdbe2"/><stop offset="0.55" stop-color="#42b0c6"/><stop offset="1" stop-color="#2f86a8"/>
  </linearGradient>
  <radialGradient id="hhalo" cx="17%" cy="52%" r="40%">
    <stop offset="0" stop-color="#2b8ea6" stop-opacity="0.18"/><stop offset="1" stop-color="#2b8ea6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="emGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0" stop-color="#3aa9c0" stop-opacity="0.16"/><stop offset="1" stop-color="#3aa9c0" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="hvig" cx="50%" cy="45%" r="75%">
    <stop offset="0.6" stop-color="#0b0e12" stop-opacity="0"/><stop offset="1" stop-color="#04060a" stop-opacity="0.6"/>
  </radialGradient>
  <filter id="soft" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="4"/></filter>
  <clipPath id="hscene"><circle cx="340" cy="340" r="238"/></clipPath>
  <path id="htopArc" d="M116.61 221.22 A253 253 0 0 1 563.39 221.22" fill="none"/>
  <path id="hbotArc" d="M111.03 483.08 A270 270 0 0 0 568.97 483.08" fill="none"/>
</defs>

<rect width="1600" height="520" fill="#0b0e12"/>
<rect width="1600" height="520" fill="url(#hhalo)"/>
<circle cx="800" cy="1320" r="860" fill="#10151f"/>
<circle cx="800" cy="1320" r="860" fill="none" stroke="#2b8ea6" stroke-width="2" opacity="0.30"/>
<g fill="#e2ece8">
  <circle cx="700" cy="70" r="1.2" opacity="0.5"/><circle cx="900" cy="48" r="0.9" opacity="0.4"/>
  <circle cx="1080" cy="92" r="1.1" opacity="0.45"/><circle cx="1280" cy="60" r="1" opacity="0.42"/>
  <circle cx="1440" cy="110" r="1.2" opacity="0.5"/><circle cx="1180" cy="150" r="0.8" opacity="0.35"/>
  <circle cx="1520" cy="210" r="0.9" opacity="0.4"/><circle cx="760" cy="120" r="0.8" opacity="0.34"/>
  <circle cx="990" cy="420" r="0.9" opacity="0.38"/><circle cx="1350" cy="400" r="0.8" opacity="0.34"/>
  <circle cx="1230" cy="450" r="1" opacity="0.4"/><circle cx="1470" cy="330" r="0.9" opacity="0.36"/>
</g>

<g fill="none" stroke="#4d9aa8" stroke-opacity="0.26" stroke-width="1.4">
  <path d="M44 78 V44 H78"/><path d="M1556 78 V44 H1522"/>
  <path d="M44 442 V476 H78"/><path d="M1556 442 V476 H1522"/>
</g>

<g transform="translate(58.94,28.94) scale(0.709)">
  <circle cx="340" cy="340" r="300" fill="url(#emGlow)"/>
  <circle cx="340" cy="340" r="296" fill="#2f9fb4"/>
  <circle cx="340" cy="340" r="289" fill="none" stroke="#17565f" stroke-width="3"/>
  <circle cx="340" cy="340" r="283" fill="#0c1118"/>
  <circle cx="340" cy="340" r="238" fill="#0a0d12"/>

  <g clip-path="url(#hscene)">
    <!-- quiet starfield inside the ring -->
    <g fill="#dcefe9">
      <circle cx="168" cy="196" r="1.2" opacity="0.45"/><circle cx="200" cy="158" r="0.9" opacity="0.38"/>
      <circle cx="512" cy="168" r="1.1" opacity="0.45"/><circle cx="486" cy="206" r="0.9" opacity="0.4"/>
      <circle cx="150" cy="262" r="1" opacity="0.4"/><circle cx="540" cy="262" r="1.1" opacity="0.44"/>
      <circle cx="498" cy="402" r="0.9" opacity="0.36"/><circle cx="178" cy="372" r="0.9" opacity="0.36"/>
    </g>
    <!-- planet limb at the base of the scene -->
    <circle cx="340" cy="845" r="360" fill="#141d29"/>
    <circle cx="340" cy="845" r="360" fill="none" stroke="#2b8ea6" stroke-width="2.5" opacity="0.6"/>
    <circle cx="340" cy="845" r="347" fill="none" stroke="#7fd8e0" stroke-width="1" opacity="0.28"/>
  </g>

  <circle cx="340" cy="340" r="239" fill="none" stroke="#b9c0c9" stroke-opacity="0.2" stroke-width="1"/>
  <g stroke="#b9c0c9" stroke-opacity="0.38" stroke-width="1.6" stroke-linecap="round">
    <line x1="340" y1="98" x2="340" y2="104" transform="rotate(45 340 340)"/>
    <line x1="340" y1="98" x2="340" y2="104" transform="rotate(135 340 340)"/>
    <line x1="340" y1="98" x2="340" y2="104" transform="rotate(225 340 340)"/>
    <line x1="340" y1="98" x2="340" y2="104" transform="rotate(315 340 340)"/>
  </g>

  <text font-size="15" letter-spacing="7" font-weight="600" text-anchor="middle" fill="#9aa3ad"><textPath href="#htopArc" startOffset="50%">EST · MMXXVI</textPath></text>
  <text font-size="15.5" letter-spacing="4" font-weight="500" text-anchor="middle" fill="#aeb6bf"><textPath href="#hbotArc" startOffset="50%">USER INTERFACE FRAMEWORK</textPath></text>

  <!-- nested-frame signal emblem, centred in the ring -->
  <g transform="translate(45.6,45.6) scale(1.15)">
    <rect x="120" y="162" width="272" height="188" fill="none" stroke="#3aa9c0" stroke-opacity="0.3" stroke-width="4"/>
    <rect x="156" y="191" width="200" height="130" fill="#0a0d12" fill-opacity="0.88" stroke="#3aa9c0" stroke-width="6"/>
    <g fill="none" stroke="#3aa9c0">
      <circle cx="256" cy="256" r="26" stroke-opacity="0.5" stroke-width="2.8"/>
      <circle cx="256" cy="256" r="44" stroke-opacity="0.28" stroke-width="2.3"/>
      <circle cx="256" cy="256" r="62" stroke-opacity="0.14" stroke-width="2"/>
    </g>
    <line x1="182" y1="256" x2="330" y2="256" stroke="#3aa9c0" stroke-width="5" stroke-linecap="round"/>
    <path d="M182 248 L190 256 L182 264 L174 256 Z" fill="#6fd0da"/>
    <path d="M330 248 L338 256 L330 264 L322 256 Z" fill="#6fd0da"/>
    <circle cx="256" cy="256" r="12" fill="none" stroke="#3aa9c0" stroke-width="5"/>
    <circle cx="256" cy="256" r="5" fill="#dff6f8"/>
  </g>

  <!-- flanking stars -->
  <g fill="#6fd0da">
    <path d="M78 328 L81.1 336.9 L90 340 L81.1 343.1 L78 352 L74.9 343.1 L66 340 L74.9 336.9 Z"/>
    <path d="M602 328 L605.1 336.9 L614 340 L605.1 343.1 L602 352 L598.9 343.1 L590 340 L598.9 336.9 Z"/>
  </g>
</g>

<text x="1050" y="272" text-anchor="middle" font-size="104" font-weight="700" letter-spacing="3"><tspan fill="url(#hosf)">OSF </tspan><tspan fill="url(#hui)">UI</tspan></text>
<g stroke="#2b8ea6" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round">
  <line x1="750" y1="300" x2="1350" y2="300"/>
  <line x1="750" y1="294" x2="750" y2="306"/><line x1="1350" y1="294" x2="1350" y2="306"/>
</g>
<text x="1050" y="338" font-size="26" letter-spacing="6" font-weight="500" fill="#aeb6bf" text-anchor="middle">WEB INTERFACE FRAMEWORK</text>

<rect width="1600" height="520" fill="url(#hvig)"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSF UI Keybinds — Dev Harness</title>
  <!-- The REAL shipped view assets: this harness previews actual code. -->
  <link rel="stylesheet" href="../../data/OSFUI/views/shared/osfui.css">
  <link rel="stylesheet" href="../../data/OSFUI/views/osfui/keybinds/style.css">
  <style>
    /* Give the transparent overlay a backdrop so it's visible in a normal tab. */
    html, body { height: 100%; }
    body { background:
      radial-gradient(120% 100% at 50% 30%, #10161f 0%, #05070b 100%) fixed; }
    .harness-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 30; height: 30px;
      display: flex; align-items: center; gap: 12px; padding: 0 14px;
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
      color: var(--text-faint); background: rgba(4,6,10,0.9); border-bottom: 1px solid var(--line);
    }
    .harness-bar b { color: var(--accent); letter-spacing: 0.16em; }
    .harness-bar .hint { margin-left: auto; }
    .harness-bar a { color: var(--text-muted); text-decoration: none; }
    .harness-bar a:hover { color: var(--accent); }
    .harness-bar a.here { color: var(--accent); }
    .harness-bar button {
      font: inherit; color: var(--text-muted); background: transparent;
      border: 1px solid var(--line-strong); border-radius: 2px; padding: 2px 8px; cursor: pointer;
    }
    .harness-bar button.on { color: var(--accent); border-color: var(--accent); }
    /* Harness-only margins to clear the top bar — dropped in the 1080p stage,
       where the view keeps its shipped in-game layout. */
    #stage { height: 100%; }
    body:not(.res1080) .keybinds { height: calc(100% - 72px); margin-top: 44px; margin-bottom: 28px; }
    /* Game-true 1920×1080 stage, scaled by script to fit the window. The scale
       transform also makes the stage the containing block for the view's
       fixed-position scrim/toasts, so they stay inside the 1080p frame. */
    body.res1080 { background: #05070b; }
    body.res1080 #stage {
      position: fixed; top: 30px; left: 0;
      width: 1920px; height: 1080px;
      transform-origin: 0 0; overflow: hidden;
      outline: 1px dashed var(--line-strong);
      background: radial-gradient(120% 100% at 50% 30%, #10161f 0%, #05070b 100%);
    }
  </style>
</head>
<body class="osf-ui">
  <div class="harness-bar">
    <b>OSF UI · MOCK BRIDGE</b>
    <a href="index.html">Mods</a>
    <a class="here" href="keybinds.html">Keybinds</a>
    <a href="osf.html">OSF Animation</a>
    <button id="mock-reset" type="button">Reset stored values</button>
    <button id="res-toggle" type="button" title="Render the view in a game-true 1920×1080 stage, scaled to fit the window">1920×1080</button>
    <span class="hint">Drop a settings/&lt;id&gt;.json here, or add ?schema=&lt;url&gt; — traffic logs to the console</span>
  </div>

  <div id="stage">
  <div class="scrim" aria-hidden="true"></div>

  <div class="keybinds">
    <header class="kb-head">
      <div class="brand">
        <svg class="brand-emblem" width="34" height="34" viewBox="0 0 200 200" aria-hidden="true">
          <circle cx="100" cy="100" r="92" fill="#11151b" stroke="#5c646e" stroke-width="3"></circle>
          <circle cx="100" cy="100" r="82" fill="none" stroke="#2f353d" stroke-width="1.2"></circle>
          <g fill="none" stroke="#9fc7dc" stroke-linecap="round" stroke-width="8">
            <line x1="62" y1="74" x2="138" y2="74"></line><line x1="62" y1="100" x2="138" y2="100"></line><line x1="62" y1="126" x2="138" y2="126"></line>
          </g>
          <circle cx="84" cy="74" r="9" fill="#0b0e12" stroke="#9fc7dc" stroke-width="6"></circle>
          <circle cx="120" cy="100" r="9" fill="#0b0e12" stroke="#9fc7dc" stroke-width="6"></circle>
          <circle cx="92" cy="126" r="9" fill="#0b0e12" stroke="#9fc7dc" stroke-width="6"></circle>
        </svg>
        <div class="brand-text">
          <div class="brand-line">
            <span class="wordmark-osf">OSF</span><span class="wordmark-ui">UI</span>
          </div>
          <div class="osf-eyebrow brand-sub">INPUT MAP</div>
        </div>
      </div>
      <label class="search-box" for="search">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4 4"></path></svg>
        <input id="search" class="osf-input kb-search" type="text" placeholder="Find a key, action, or mod" aria-label="Find a key, action, or mod" aria-keyshortcuts="Control+F" autocomplete="off" spellcheck="false">
        <kbd>Ctrl F</kbd>
      </label>
      <button id="close" type="button" class="osf-btn osf-btn--ghost osf-btn--sm close-btn" aria-keyshortcuts="Escape"><span>Close</span><kbd>Esc</kbd></button>
    </header>

    <section class="kb-board-shell" aria-labelledby="keyboard-title">
      <div class="kb-board-head">
        <div>
          <div class="osf-eyebrow" id="keyboard-title">Keyboard map</div>
          <p>Select a key to inspect every action assigned to it.</p>
        </div>
        <div class="kb-legend osf-eyebrow" aria-hidden="true">
          <span class="legend-item"><i class="legend-swatch legend-mod"></i>Mod</span>
          <span class="legend-item"><i class="legend-swatch legend-game"></i>Game</span>
          <span class="legend-item"><i class="legend-swatch legend-shared"></i>Shared</span>
          <span class="legend-item"><i class="legend-swatch legend-conflict"></i>Conflict</span>
        </div>
      </div>
      <div id="keyboard" class="kb-board" aria-label="Keyboard map"></div>
    </section>

    <div class="kb-lower">
      <section class="kb-panel kb-detail-panel" aria-live="polite">
        <div class="osf-eyebrow kb-panel-title" id="detail-title">Select a key</div>
        <div id="detail" class="kb-detail"></div>
      </section>
      <section class="kb-panel kb-list-panel">
        <div class="osf-eyebrow kb-panel-title" id="list-title">All bindings</div>
        <div id="bindlist" class="kb-list"></div>
      </section>
    </div>

    <p id="status" class="kb-status osf-eyebrow">Loading…</p>
  </div>

  <div id="toast" class="toast-stack" aria-live="polite"></div>
  </div><!-- /#stage -->

  <!-- Bridge first (defines window.osfui), then the real view logic. -->
  <!-- Order matters: mock installs window.osfui.postMessage, the shared helper
       decorates it (and owns onMessage), then the view uses the helper. -->
  <script src="mockbridge.js"></script>
  <script src="../../data/OSFUI/views/shared/osfui.js"></script>
  <script src="../../data/OSFUI/views/osfui/keybinds/main.js"></script>
  <script>
    document.getElementById("mock-reset").addEventListener("click", () => window.osfui._mock.reset());

    const stage = document.getElementById("stage");
    const resBtn = document.getElementById("res-toggle");
    const fitStage = () => {
      if (!document.body.classList.contains("res1080")) { stage.removeAttribute("style"); return; }
      const bar = 30;
      const scale = Math.min(window.innerWidth / 1920, (window.innerHeight - bar) / 1080, 1);
      stage.style.transform = `scale(${scale})`;
      stage.style.left = `${Math.max(0, (window.innerWidth - 1920 * scale) / 2)}px`;
      stage.style.top = `${bar + Math.max(0, (window.innerHeight - bar - 1080 * scale) / 2)}px`;
    };
    resBtn.addEventListener("click", () => {
      resBtn.classList.toggle("on", document.body.classList.toggle("res1080"));
      fitStage();
    });
    window.addEventListener("resize", fitStage);
    if (new URLSearchParams(location.search).get("res") === "1080") resBtn.click();
  </script>
</body>
</html>

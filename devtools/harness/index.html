<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSF UI Settings — Dev Harness</title>
  <!-- The REAL shipped view assets: this harness previews actual code. -->
  <link rel="stylesheet" href="../../data/OSFUI/views/shared/osfui.css">
  <link rel="stylesheet" href="../../data/OSFUI/views/osfui/settings/style.css">
  <style>
    /* Give the transparent overlay a backdrop so it's visible in a normal tab. */
    html, body { height: 100%; }
    body { background:
      radial-gradient(120% 100% at 50% 30%, #10161f 0%, #05070b 100%) fixed; }
    .harness-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 30; height: 30px;
      display: flex; align-items: center; gap: 12px; padding: 0 14px;
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
      color: var(--text-faint); background: rgba(4,6,10,0.9); border-bottom: 1px solid var(--line);
    }
    .harness-bar b { color: var(--accent); letter-spacing: 0.16em; }
    .harness-bar .hint { margin-left: auto; }
    .harness-bar a { color: var(--text-muted); text-decoration: none; }
    .harness-bar a:hover { color: var(--accent); }
    .harness-bar a.here { color: var(--accent); }
    .harness-bar button {
      font: inherit; color: var(--text-muted); background: transparent;
      border: 1px solid var(--line-strong); border-radius: 2px; padding: 2px 8px; cursor: pointer;
    }
    .settings { height: calc(100% - 72px); margin-top: 44px; margin-bottom: 28px; }
  </style>
</head>
<body class="osf-ui">
  <div class="harness-bar">
    <b>OSF UI · MOCK BRIDGE</b>
    <a class="here" href="index.html">Mods</a>
    <a href="keybinds.html">Keybinds</a>
    <a href="osf.html">OSF Animation</a>
    <button id="mock-reset" type="button">Reset stored values</button>
    <button id="mock-fixtures" type="button" title="Show fictional sample panels/HUDs that exercise every catalog state (failed load, HUD live/hidden, …)"></button>
    <span class="hint">Drop a settings/&lt;id&gt;.json here, or add ?schema=&lt;url&gt; — traffic logs to the console</span>
  </div>

  <div class="scrim" aria-hidden="true"></div>

  <div class="settings">
    <aside class="rail">
      <div class="rail-head">
        <div class="brand">
          <svg class="brand-emblem" width="34" height="34" viewBox="0 0 200 200" aria-hidden="true">
            <circle cx="100" cy="100" r="92" fill="#11151b" stroke="#5c646e" stroke-width="3"></circle>
            <circle cx="100" cy="100" r="82" fill="none" stroke="#2f353d" stroke-width="1.2"></circle>
            <g fill="none" stroke="#9fc7dc" stroke-linecap="round" stroke-width="8">
              <line x1="62" y1="74" x2="138" y2="74"></line><line x1="62" y1="100" x2="138" y2="100"></line><line x1="62" y1="126" x2="138" y2="126"></line>
            </g>
            <circle cx="84" cy="74" r="9" fill="#0b0e12" stroke="#9fc7dc" stroke-width="6"></circle>
            <circle cx="120" cy="100" r="9" fill="#0b0e12" stroke="#9fc7dc" stroke-width="6"></circle>
            <circle cx="92" cy="126" r="9" fill="#0b0e12" stroke="#9fc7dc" stroke-width="6"></circle>
          </svg>
          <div class="brand-text">
            <div class="brand-line">
              <span class="wordmark-osf">OSF</span><span class="wordmark-ui">UI</span>
            </div>
            <div class="osf-eyebrow brand-sub">CONTROL DECK</div>
          </div>
          <!-- Filled from the runtime.ready handshake; hidden until it arrives. -->
          <span id="plugin-version" class="version-badge" title="OSF UI version"></span>
        </div>
        <label class="search-box" for="filter">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4 4"></path></svg>
          <input id="filter" class="osf-input filter" type="text" placeholder="Search mods & settings" aria-label="Search mods and settings" aria-keyshortcuts="Control+F" autocomplete="off" spellcheck="false">
          <kbd>Ctrl F</kbd>
        </label>
        <div class="rail-meta"><span>Installed systems</span><span>Configure</span></div>
      </div>

      <nav id="rail-list" class="rail-list" aria-label="Installed mods"></nav>

      <div class="rail-foot">
        <span id="save-state" class="save-state osf-eyebrow" aria-live="polite"></span>
        <button id="session-chip" type="button" class="osf-btn osf-btn--ghost osf-btn--sm session-chip" style="display:none">Undo changes (0)</button>
        <button id="close" type="button" class="osf-btn osf-btn--ghost osf-btn--sm close-btn" aria-keyshortcuts="Escape"><span>Exit control deck</span><kbd>Esc</kbd></button>
      </div>
    </aside>

    <section id="detail" class="detail" aria-live="polite">
      <p id="status" class="status osf-eyebrow">Loading…</p>
    </section>
  </div>

  <div id="toast" class="toast-stack" aria-live="polite"></div>

  <!-- Bridge first (defines window.osfui), then the real view logic. -->
  <script src="mockbridge.js"></script>
  <script src="../../data/OSFUI/views/osfui/settings/main.js"></script>
  <script>
    document.getElementById("mock-reset").addEventListener("click", () => window.osfui._mock.reset());
    const fixturesBtn = document.getElementById("mock-fixtures");
    const fixturesLabel = (on) => { fixturesBtn.textContent = `Sample views: ${on ? "on" : "off"}`; };
    fixturesLabel(window.osfui._mock.fixturesOn());
    fixturesBtn.addEventListener("click", () => fixturesLabel(window.osfui._mock.fixtures()));
  </script>
</body>
</html>

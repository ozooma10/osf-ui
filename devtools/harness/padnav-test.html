<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>padnav headless test</title>
  <link rel="stylesheet" href="../../data/OSFUI/views/shared/osfui.css">
  <link rel="stylesheet" href="../../data/OSFUI/views/osfui/settings/style.css">
  <style>html, body { height: 100%; } body { background: #05070b; }</style>
</head>
<body>
  <div class="scrim" aria-hidden="true"></div>
  <div class="settings">
    <aside class="rail">
      <div class="rail-head">
        <div class="brand">
          <div class="brand-text">
            <div class="brand-line"><span class="wordmark-osf">OSF</span><span class="wordmark-ui">UI</span></div>
            <div class="osf-eyebrow brand-sub">CONTROL DECK</div>
          </div>
          <div class="version-stack">
            <span id="plugin-version" class="version-badge"></span>
            <span id="needs-update-tag" class="needs-update-tag" hidden>Needs update</span>
          </div>
        </div>
        <label class="osf-search" for="filter">
          <input id="filter" class="osf-input filter" type="text" placeholder="Search" autocomplete="off">
        </label>
        <div class="rail-meta"><span>Installed systems</span><span>Configure</span></div>
      </div>
      <nav id="rail-list" class="rail-list"></nav>
      <div class="rail-foot">
        <span id="save-state" class="save-state osf-eyebrow"></span>
        <button id="session-chip" type="button" class="osf-btn osf-btn--ghost osf-btn--sm session-chip" style="display:none">Undo changes (0)</button>
        <button id="close" type="button" class="osf-btn osf-btn--ghost osf-btn--sm osf-close"><span>Exit control deck</span></button>
      </div>
    </aside>
    <section id="detail" class="detail">
      <p id="status" class="status osf-eyebrow">Loading…</p>
    </section>
  </div>
  <div id="toast" class="toast-stack"></div>

  <script src="mockbridge.js"></script>
  <script src="../../data/OSFUI/views/shared/osfui.js"></script>
  <script src="../../data/OSFUI/views/osfui/padnav.js"></script>
  <script src="../../data/OSFUI/views/osfui/settings/main.js"></script>
  <script>
  // Headless verification of padnav.js against the REAL settings view + mock
  // bridge. Results land in #results; the runner dumps the DOM and greps.
  (function () {
    const results = [];
    const ok = (name, cond, extra) =>
      results.push(`${cond ? "PASS" : "FAIL"} ${name}${extra ? " :: " + extra : ""}`);

    function key(code) {
      const e = new KeyboardEvent("keydown", { bubbles: true, cancelable: true });
      Object.defineProperty(e, "keyCode", { get: () => code });
      (document.activeElement && document.activeElement !== document.body
        ? document.activeElement : document.body).dispatchEvent(e);
    }
    const DOWN = 40, UP = 38, LEFT = 37, RIGHT = 39, ENTER = 13;
    const active = () => document.activeElement;
    const desc = (el) => el ? `${el.tagName}.${String(el.className).split(" ")[0]}#${el.id || ""}` : "null";

    window.addEventListener("load", () => setTimeout(run, 400));

    function run() {
      try {
        // 0: the mock bridge fed the view — rail has items.
        const railItems = document.querySelectorAll("#rail-list .rail-item");
        ok("mock-data-rendered", railItems.length >= 2, `${railItems.length} rail items`);

        // 1: first arrow press focuses a real control (not the search input).
        key(DOWN);
        ok("first-press-focuses", active() && active() !== document.body &&
          active().tagName !== "INPUT", desc(active()));

        // 2: repeated Down walks downward.
        const before = active();
        const beforeTop = before.getBoundingClientRect().top;
        key(DOWN);
        ok("down-moves-down", active() !== before &&
          active().getBoundingClientRect().top > beforeTop, desc(active()));

        // 3: Up goes back.
        key(UP);
        ok("up-returns", active() === before, desc(active()));

        // 4: Enter clicks a rail item and focus survives the pane rebuild.
        const target = document.querySelector('#rail-list .rail-item[data-mod="osfui"]');
        target.focus();
        key(ENTER);
        setTimeout(() => {
          ok("enter-selects-rail", target.className.includes("selected") ||
            !!document.querySelector('#rail-list .rail-item.selected[data-mod="osfui"]'),
            desc(active()));
          ok("refocus-after-rebuild", active() && active() !== document.body, desc(active()));

          // 5: Right from the rail crosses into the detail pane.
          const railItem = document.querySelector("#rail-list .rail-item.selected") ||
            document.querySelector("#rail-list .rail-item");
          railItem.focus();
          key(RIGHT);
          ok("right-crosses-to-detail",
            active() && !!active().closest && !!active().closest("#detail"), desc(active()));

          // 6: select cycling with Left/Right (padnav's own path).
          const sel = document.querySelector("#detail select.osf-select");
          if (sel) {
            sel.focus();
            const i0 = sel.selectedIndex;
            key(RIGHT);
            const moved = sel.selectedIndex === Math.min(sel.options.length - 1, i0 + 1);
            key(LEFT);
            ok("select-left-right-cycles", moved && sel.selectedIndex === i0,
              `idx ${i0} -> ${sel.selectedIndex}`);
            // 7: Up/Down leave the select instead of changing it.
            const iBefore = sel.selectedIndex;
            key(UP);
            ok("select-updown-navigates", active() !== sel && sel.selectedIndex === iBefore,
              desc(active()));
          } else {
            ok("select-left-right-cycles", false, "no select in detail pane");
            ok("select-updown-navigates", false, "no select in detail pane");
          }

          // 8: Up/Down move away from a focused slider (nav, not value change).
          const slider = document.querySelector("#detail input[type=range]");
          if (slider) {
            slider.focus();
            const v0 = slider.value;
            key(UP);
            ok("range-updown-navigates", active() !== slider && slider.value === v0,
              desc(active()));
          } else {
            ok("range-updown-navigates", true, "skipped: no slider in this schema");
          }

          // 9: switch toggles via Enter.
          const sw = document.querySelector("#detail .osf-switch");
          if (sw) {
            sw.focus();
            const s0 = sw.getAttribute("aria-pressed");
            key(ENTER);
            setTimeout(() => {
              ok("enter-toggles-switch", sw.getAttribute("aria-pressed") !== s0,
                `${s0} -> ${sw.getAttribute("aria-pressed")}`);
              // 10: focus ring modality class got set by key navigation.
              ok("padnav-kb-class", document.documentElement.classList.contains("padnav-kb"));
              finish();
            }, 30);
          } else {
            ok("enter-toggles-switch", false, "no switch in detail pane");
            finish();
          }
        }, 30);
      } catch (err) {
        results.push("ERROR " + (err && err.stack || err));
        finish();
      }
    }

    function finish() {
      fetch("/__results", { method: "POST", body: results.join(String.fromCharCode(10)) });
    }
  })();
  </script>
</body>
</html>
